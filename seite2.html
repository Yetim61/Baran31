<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix System</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    color:#00ff00;
    font-family:Consolas, monospace;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

.container{
    text-align:center;
    margin-top:80px;
}

.clock{
    font-size:90px;
    font-weight:bold;

    text-shadow:
    0 0 10px #00ff00,
    0 0 20px #00ff00,
    0 0 40px #00ff00,
    0 0 80px #00ff00;

    margin-bottom:40px;
}

h1{
    font-size:70px;

    text-shadow:
    0 0 10px #00ff00,
    0 0 20px #00ff00,
    0 0 40px #00ff00;

    margin-bottom:30px;
}

.eierbild{
    width:550px;
    max-width:80%;

    filter:
    drop-shadow(0 0 15px #00ff00)
    drop-shadow(0 0 25px #00ff00);
}

.back{

    position:fixed;

    right:20px;
    bottom:80px;

    background:black;
    color:#00ff00;

    border:2px solid #00ff00;

    padding:15px 30px;

    font-size:20px;

    cursor:pointer;
}

.back:hover{
    box-shadow:0 0 25px #00ff00;
}

#terminal{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;

    background:rgba(0,0,0,0.9);

    border-top:1px solid #00ff00;

    padding:15px;

    font-size:18px;

    color:#00ff00;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div id="clock" class="clock"></div>

<h1>Baran hat keine Eier mehr</h1>

<img
src="eier.png"
alt="Eier"
class="eierbild">

</div>

<button
class="back"
onclick="window.location.href='index.html'">

← Zurück

</button>

<div id="terminal">

> INITIALISIERE MATRIX...

</div>

<script>

function updateClock(){

const now = new Date();

let h =
String(now.getHours()).padStart(2,'0');

let m =
String(now.getMinutes()).padStart(2,'0');

let s =
String(now.getSeconds()).padStart(2,'0');

document.getElementById(
"clock"
).innerHTML =
`${h}:${m}:${s}`;

}

setInterval(
updateClock,
1000
);

updateClock();

const terminal =
document.getElementById("terminal");

const messages = [

"> INITIALISIERE MATRIX...",
"> SUCHE NACH ANOMALIEN...",
"> AGENT SMITH NICHT GEFUNDEN",
"> RED PILL ERKANNT",
"> WAKE UP NEO...",
"> FOLLOW THE WHITE RABBIT",
"> ZUGRIFF AUF DIE WAHRHEIT...",
"> MATRIX KERN ONLINE",
"> REALITÄT WIRD GELADEN",
"> FREIHEITSPROTOKOLL AKTIV"

];

let msg = 0;

setInterval(()=>{

terminal.innerHTML =
messages[msg];

msg++;

if(msg >= messages.length){
msg = 0;
}

},3000);

const canvas =
document.getElementById(
"matrix"
);

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const chars =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize = 18;

const columns =
canvas.width/fontSize;

const drops = [];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){

ctx.fillStyle =
"rgba(0,0,0,0.05)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"#00ff00";

ctx.font =
fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text =
chars[
Math.floor(
Math.random()*chars.length
)
];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize >
canvas.height
&&
Math.random() > 0.975
){
drops[i]=0;
}

drops[i]++;
}
}

setInterval(draw,35);

</script>

</body>
</html>
