<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Homepage</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    color:#00ff00;
    font-family:Consolas, monospace;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

#intro{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    z-index:9999;

    text-shadow:
    0 0 10px #00ff00,
    0 0 20px #00ff00,
    0 0 40px #00ff00;
}

.content{
    position:relative;
    text-align:center;
    margin-top:120px;
    display:none;
}

.clock{
    position:fixed;
    top:20px;
    right:20px;

    font-size:50px;
    font-weight:bold;
    letter-spacing:4px;

    color:#00ff00;

    text-shadow:
    0 0 5px #00ff00,
    0 0 10px #00ff00,
    0 0 20px #00ff00,
    0 0 40px #00ff00,
    0 0 80px #00ff00;

    animation:
    flicker 0.12s infinite,
    glitch 3s infinite;
}

@keyframes flicker{

    0%{opacity:1;}
    2%{opacity:0.4;}
    4%{opacity:1;}
    8%{opacity:0.7;}
    10%{opacity:1;}
    100%{opacity:1;}

}

@keyframes glitch{

    0%{
        transform:translate(0);
    }

    20%{
        transform:translate(-1px,1px);
    }

    40%{
        transform:translate(1px,-1px);
    }

    60%{
        transform:translate(-2px,0);
    }

    80%{
        transform:translate(2px,1px);
    }

    100%{
        transform:translate(0);
    }

}

.button{

    background:black;
    color:#00ff00;

    border:2px solid #00ff00;

    padding:15px 30px;

    font-size:20px;

    cursor:pointer;

    margin-top:30px;
}

.button:hover{

    box-shadow:
    0 0 25px #00ff00;
}

#terminal{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;

    background:rgba(0,0,0,0.9);

    border-top:1px solid #00ff00;

    padding:15px;

    font-size:18px;
}

</style>
</head>

<body>

<div id="intro"></div>

<div id="clock" class="clock"></div>

<div class="matrix-status">
SYSTEM ONLINE
</div>

<canvas id="matrix"></canvas>

<div id="clock" class="clock"></div>

<div class="content" id="content">

<h1>Homepage von Baran E. </h1>

<p>Nur die Wahrheit wartet hinter dem nächsten Klick.</p>

<button
class="button"
onclick="window.location.href='seite2.html'">

HIER GEHT ES WEITER

</button>

</div>

<div id="terminal">

> INITIALISIERE MATRIX...

</div>

<script>

/* INTRO */

const introText =
"BARAN...";

let i = 0;

const intro =
document.getElementById("intro");

function typeIntro(){

if(i < introText.length){

intro.innerHTML +=
introText.charAt(i);

i++;

setTimeout(typeIntro,120);

}else{

setTimeout(()=>{

intro.innerHTML =
"Gedulde dich gleich Kommt was COOLES :D...";

},1500);

setTimeout(()=>{

intro.style.display="none";

document.getElementById(
"content"
).style.display="block";

},4000);

}

}

typeIntro();

/* UHR */

function updateClock(){

const now = new Date();

let h =
String(now.getHours()).padStart(2,'0');

let m =
String(now.getMinutes()).padStart(2,'0');

let s =
String(now.getSeconds()).padStart(2,'0');

document.getElementById("clock")
.innerHTML =
`${h}:${m}:${s}`;

}

setInterval(updateClock,1000);

updateClock();

/* TERMINAL */

const terminal =
document.getElementById("terminal");

const messages = [

"> INITIALISIERE MATRIX...",
"> SUCHE NACH ANOMALIEN...",
"> Baran hat keine Sackhaare",
"> RED PILL ERKANNT",
"> WAKE UP NEO...",
"> FOLLOW THE WHITE RABBIT",
"> MATRIX KERN ONLINE",
"> REALITÄT WIRD GELADEN",
"> ZION VERBUNDEN",
"> FREIHEITSPROTOKOLL AKTIV"

];

let msg = 0;

setInterval(()=>{

terminal.innerHTML =
messages[msg];

msg++;

if(msg >= messages.length){
msg = 0;
}

},3000);

/* MATRIX REGEN */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const letters =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

const chars =
letters.split("");

const fontSize = 16;

const columns =
canvas.width/fontSize;

const drops = [];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){

ctx.fillStyle =
"rgba(0,0,0,0.05)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"#00ff00";

ctx.font =
fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text =
chars[
Math.floor(
Math.random()*chars.length
)
];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize >
canvas.height &&
Math.random() > 0.975
){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,35);

window.addEventListener(
"resize",
()=>{

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}
);

</script>

</body>
</html>
